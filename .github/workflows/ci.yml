name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-check:
    name: Lint & syntax check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Syntax check (all source files)
        run: |
          python -m py_compile frontend.py agent.py tools.py vector_store.py
          echo "Syntax OK"

      - name: Lint — critical errors only (E9, F63, F7, F82)
        run: |
          pip install flake8
          flake8 frontend.py agent.py tools.py vector_store.py \
            --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Import smoke test
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python - <<'EOF'
          import streamlit
          import groq
          import pydicom
          from PIL import Image
          import numpy as np
          from vector_store import get_store
          print("All imports OK")
          EOF

  deploy-check:
    name: Streamlit deploy readiness
    runs-on: ubuntu-latest
    needs: lint-and-check

    steps:
      - uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          test -f frontend.py      && echo "frontend.py OK"
          test -f requirements.txt && echo "requirements.txt OK"
          test -f .streamlit/config.toml && echo ".streamlit/config.toml OK"

      - name: Verify no secrets are committed
        run: |
          if git grep -r "GROQ_API_KEY\s*=" -- '*.py' ':!agent.py' ':!test_pipeline.py' 2>/dev/null | grep -v "os.getenv\|st.secrets\|#"; then
            echo "ERROR: Possible hardcoded secret found" && exit 1
          fi
          if [ -f .env ]; then
            echo "ERROR: .env file is committed — must not be in repo" && exit 1
          fi
          echo "No committed secrets found"
